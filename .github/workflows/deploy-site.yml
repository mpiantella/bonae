name: Deploy site (publish)

on:
  repository_dispatch:
    types: [publish-site]
  workflow_dispatch:

concurrency:
  group: deploy-site
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # When `SKIP_FETCH_I18N` is `true`, use committed `apps/static/i18n-overrides.json` only (Decap / git workflow).
      - name: Configure AWS credentials (OIDC)
        if: ${{ vars.SKIP_FETCH_I18N != 'true' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: sa-east-1

      - run: npm ci
        working-directory: apps/static

      - name: Fetch published i18n overrides from DynamoDB
        if: ${{ vars.SKIP_FETCH_I18N != 'true' }}
        run: npm run fetch:i18n
        working-directory: apps/static
        env:
          CONTENT_TABLE_NAME: ${{ secrets.CONTENT_TABLE_NAME }}

      - run: npm run build
        working-directory: apps/static

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy dist --project-name bonae-tech
        working-directory: apps/static
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
